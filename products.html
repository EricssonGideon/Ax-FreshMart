<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshMart | Products</title>
<meta name="description" content="Browse all FreshMart products with filters, search, sorting, and reusable product cards.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="products">
  <header class="site-header" id="site-header"></header>
  <main class="shell">
    <section class="page-header">
      <div class="page-title">
        <h2>Shop Products</h2>
        <p id="product-count">0 products shown</p>
      </div>
    </section>

    <section class="toolbar">
      <div class="toolbar-top">
        <div class="search-shell" style="width:min(100%,520px)">
          <label class="search" aria-label="Search products in catalog">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
            <input id="products-search" type="search" placeholder="Search fresh groceries..." autocomplete="off">
          </label>
        </div>
        <button class="btn-secondary pressable mobile-filter-trigger" id="open-filter-drawer" type="button">Filters</button>
        <label class="tool-select" aria-label="Sort products">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"></path></svg>
          <select id="products-sort">
            <option value="popular">Popular</option>
            <option value="trending">Trending</option>
            <option value="price-asc">Price low to high</option>
            <option value="price-desc">Price high to low</option>
            <option value="rating">Top rated</option>
            <option value="name-asc">Name A-Z</option>
          </select>
        </label>
      </div>
      <div class="toolbar-row">
        <div class="filters" id="category-filters">
          <button class="chip active pressable" type="button" data-category="all">All</button>
          <button class="chip pressable" type="button" data-category="fruit">Fruits</button>
          <button class="chip pressable" type="button" data-category="veg">Vegetables</button>
          <button class="chip pressable" type="button" data-category="dairy">Dairy</button>
          <button class="chip pressable" type="button" data-category="bakery">Bakery</button>
          <button class="chip pressable" type="button" data-category="drink">Drinks</button>
          <button class="chip pressable" type="button" data-category="snack">Snacks</button>
        </div>
        <div class="toolbar-filters-desktop">
          <label class="tool-select" aria-label="Availability filter">
            <select id="availability-filter">
              <option value="all">All availability</option>
              <option value="in-stock">In stock</option>
              <option value="low-stock">Low stock</option>
              <option value="out-of-stock">Out of stock</option>
            </select>
          </label>
          <label class="tool-select" aria-label="Price filter">
            <select id="price-filter">
              <option value="all">All prices</option>
              <option value="under-5">Under $5</option>
              <option value="5-10">$5 to $10</option>
              <option value="above-10">Above $10</option>
            </select>
          </label>
        </div>
      </div>
    </section>

    <section class="product-grid" id="products-grid"></section>
  </main>
  <div class="filter-overlay" id="filter-overlay"></div>
  <aside class="filter-drawer" id="filter-drawer">
    <div class="drawer-head">
      <div>
        <strong>Filters</strong>
        <p>Narrow products quickly on mobile.</p>
      </div>
      <button class="close-btn pressable" id="close-filter-drawer" type="button">Close</button>
    </div>
    <div class="drawer-body">
      <label class="field" style="display:grid;gap:8px">
        <span>Availability</span>
        <select id="availability-filter-mobile">
          <option value="all">All availability</option>
          <option value="in-stock">In stock</option>
          <option value="low-stock">Low stock</option>
          <option value="out-of-stock">Out of stock</option>
        </select>
      </label>
      <label class="field" style="display:grid;gap:8px">
        <span>Price</span>
        <select id="price-filter-mobile">
          <option value="all">All prices</option>
          <option value="under-5">Under $5</option>
          <option value="5-10">$5 to $10</option>
          <option value="above-10">Above $10</option>
        </select>
      </label>
    </div>
  </aside>
  <footer class="site-footer" id="site-footer"></footer>
  <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/main.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
